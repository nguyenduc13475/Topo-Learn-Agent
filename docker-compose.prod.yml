services:
  postgres:
    image: postgres:15-alpine
    container_name: topo_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always

  neo4j:
    image: neo4j:5.12.0
    container_name: topo_neo4j_prod
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4j_data_prod:/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: topo_redis_prod
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: topo_backend_prod
    # ADDED --forwarded-allow-ips="*" to pass client IPs through Nginx for Rate Limiting
    command: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --forwarded-allow-ips="*" --proxy-protocol --proxy-allow-from="*"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/data/uploads:/app/data/uploads
    depends_on:
      - postgres
      - neo4j
      - redis
    restart: always

  worker-gpu:
    profiles: ["gpu"]
    build:
      context: ./backend
      dockerfile: worker.Dockerfile
    container_name: topo_worker_gpu_prod
    # Concurrency set to 2 to prevent VRAM Out-Of-Memory errors when multiple large models load simultaneously
    command: celery -A app.core.celery_app worker --loglevel=info -c 2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - redis
    restart: always

  worker-cpu:
    profiles: ["cpu"]
    build:
      context: ./backend
      dockerfile: worker.cpu.Dockerfile
    container_name: topo_worker_cpu_prod
    # Concurrency set to 2 to prevent VRAM Out-Of-Memory errors when multiple large models load simultaneously
    command: celery -A app.core.celery_app worker --loglevel=info -c 2
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: topo_frontend_prod
    environment:
      # NOTE: In Production, API calls from the Client browser must point to Nginx (port 80).
      - NEXT_PUBLIC_API_URL=/api/v1
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: topo_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  postgres_data_prod:
  neo4j_data_prod:
