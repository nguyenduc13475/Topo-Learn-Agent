services:
  postgres:
    image: postgres:15-alpine
    container_name: topo_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-topolearnpostgre2357}
      POSTGRES_DB: ${POSTGRES_DB:-topo_learning}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  neo4j:
    image: neo4j:5.12.0
    container_name: topo_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-topolearnneo4j2357}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: topo_redis
    ports:
      - "6379:6379"
    restart: always

  # Backend Web Server (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: topo_backend
    # ADDED --forwarded-allow-ips="*" to pass client IPs through for Rate Limiting
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4 --proxy-headers --forwarded-allow-ips="*"
    ports:
      - "8000:8000"
    environment:
      - CORS_ORIGINS=*
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-topolearnpostgre2357}@postgres:5432/${POSTGRES_DB:-topo_learning}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-topolearnneo4j2357}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/data/uploads:/app/data/uploads
    depends_on:
      - postgres
      - neo4j
      - redis
    restart: always

  # Background AI Worker (GPU Version)
  worker-gpu:
    profiles: ["gpu"]
    build:
      context: ./backend
      dockerfile: worker.Dockerfile
    container_name: topo_worker_gpu
    command: celery -A app.core.celery_app worker --loglevel=info -c 2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-topolearnpostgre2357}@postgres:5432/${POSTGRES_DB:-topo_learning}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - redis
      - postgres
    restart: always

  # Background AI Worker (CPU Version)
  worker-cpu:
    profiles: ["cpu"]
    build:
      context: ./backend
      dockerfile: worker.cpu.Dockerfile
    container_name: topo_worker_cpu
    command: celery -A app.core.celery_app worker --loglevel=info -c 2
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-topolearnpostgre2357}@postgres:5432/${POSTGRES_DB:-topo_learning}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - redis
      - postgres
    restart: always

  # Frontend Web App (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: topo_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://8000-01km3s9dde4b3qwfvsv4kt633a.cloudspaces.litng.ai/api/v1
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  neo4j_data:
